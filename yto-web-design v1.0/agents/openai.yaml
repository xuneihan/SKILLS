interface:
  display_name: "YTO Web Design (Figma)"
  short_description: "Ant-style HTML UI for Figma"
  default_prompt: "Generate a self-contained HTML backend UI based on my request using Ant Design-like styles (no React/Ant package installs). First read references/ant-visual-profile.md; if details are missing, use references/LLMs.txt to locate topics and retrieve only relevant snippets from references/llms-full.txt (never load full corpus). Keep only requested sections. For generic table fallback, use Name/Age/Address/Tags/Action with link-style Name, Tag color mapping (length>5 geekblue, else green, loser volcano), and Action as Invite+divider+Delete. If list/table data is required, align with Ant-like visual behavior (row baseline 48px, adaptive row-height handling, light gray row hover, no vertical column lines by default, and no list header bar by default). Apply global font family 'Noto Sans SC', fallback 'PingFang SC', then sans-serif. Respect user-provided fields exactly; otherwise mock context-appropriate fields and values."
