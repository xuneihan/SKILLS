<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <style>
      :root {
        --primary: {{PRIMARY}};
        --primary-rgb: {{PRIMARY_RGB}};
        --purple-0: {{PURPLE_0}};
        --purple-1: {{PURPLE_1}};
        --purple-2: {{PURPLE_2}};
        --purple-3: {{PURPLE_3}};
        --purple-4: {{PURPLE_4}};
        --purple-5: {{PURPLE_5}};
        --purple-6: {{PURPLE_6}};
        --purple-7: {{PURPLE_7}};
        --purple-8: {{PURPLE_8}};
        --purple-9: {{PURPLE_9}};

        --primary-hover: var(--purple-7);
        --primary-active: var(--purple-8);

        --bg: #f0f2f5;
        --panel: #ffffff;
        --line: #e8e8e8;
        --line-soft: #f0f0f0;
        --text: rgba(0, 0, 0, 0.85);
        --text-weak: rgba(0, 0, 0, 0.65);
        --text-muted: rgba(0, 0, 0, 0.45);
        --danger: #ff4d4f;
        --link: #8B5CF6;
        --row-hover: #fafafa;

        --radius: 8px;
        --font: "Noto Sans SC", "PingFang SC", sans-serif;
      }

      html, body {
        margin: 0;
        padding: 0;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
      }
      *, *::before, *::after {
        box-sizing: border-box;
        font-family: inherit;
      }

      .page {
        width: min(1440px, calc(100% - 32px));
        margin: 24px auto;
      }
      .header {
        margin-bottom: 12px;
      }
      .header h1 {
        margin: 0;
        font-size: 20px;
        line-height: 1.4;
        font-weight: 600;
      }
      .header .meta {
        margin-top: 4px;
        font-size: 12px;
        color: var(--text-muted);
      }

      .card {
        background: var(--panel);
        border-radius: var(--radius);
      }

      .query-card {
        padding: 16px;
        border: 1px solid var(--line-soft);
      }

      .query-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(180px, 1fr));
        gap: 12px;
      }
      .field-label {
        margin-bottom: 8px;
        font-size: 14px;
        line-height: 1.5;
        color: var(--text-weak);
      }

      .ant-input,
      .ant-select {
        width: 100%;
        height: 32px;
        padding: 4px 11px;
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        font-size: 14px;
        line-height: 1.5;
        outline: none;
        transition: all .2s;
      }
      .ant-input:focus,
      .ant-select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(var(--primary-rgb), .2);
      }
      .ant-input.is-error,
      .ant-select.is-error {
        border-color: var(--danger);
        box-shadow: 0 0 0 2px rgba(255, 77, 79, .2);
      }
      .error-tip {
        margin-top: 6px;
        font-size: 12px;
        line-height: 1.5;
        color: var(--danger);
      }

      .actions {
        margin-top: 14px;
        display: flex;
        gap: 8px;
      }
      .ant-btn {
        border: 1px solid #d9d9d9;
        border-radius: 4px;
        background: #fff;
        color: var(--text);
        height: 32px;
        padding: 0 15px;
        font-size: 14px;
        line-height: 1.5;
        cursor: pointer;
        transition: all .2s;
      }
      .ant-btn:hover {
        color: var(--primary);
        border-color: var(--primary);
      }
      .ant-btn:active { transform: translateY(1px); }
      .ant-btn.primary {
        color: #fff;
        border-color: var(--primary);
        background: var(--primary);
      }
      .ant-btn.primary:hover {
        border-color: var(--primary-hover);
        background: var(--primary-hover);
        color: #fff;
      }
      .ant-btn.primary:active {
        border-color: var(--primary-active);
        background: var(--primary-active);
      }

      .list-card {
        margin-top: 12px;
        border-radius: var(--radius);
        overflow: hidden;
      }
      .list-head {
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .list-head h2 {
        margin: 0;
        font-size: 16px;
        line-height: 1.5;
        font-weight: 500;
      }
      .list-head .count {
        font-size: 12px;
        color: var(--text-muted);
      }

      .table-wrap { overflow-x: auto; background:#fff; }
      .ant-table {
        width: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .ant-table th,
      .ant-table td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 12px 16px;
        font-size: 14px;
        line-height: 24px;
        color: var(--text);
        vertical-align: middle;
      }
      .ant-table th {
        background: #fafafa;
        font-weight: 500;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .ant-table tbody tr:hover td {
        background: var(--row-hover);
      }
      .ant-table tbody td {
        height: 48px;
      }
      .ant-table.with-vertical-lines th,
      .ant-table.with-vertical-lines td {
        border-right: 1px solid var(--line);
      }
      .ant-table.with-vertical-lines th:last-child,
      .ant-table.with-vertical-lines td:last-child {
        border-right: none;
      }

      .cell-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .cell-tags {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .ant-tag {
        display: inline-block;
        flex: 0 0 auto;
        height: 22px;
        line-height: 20px;
        padding: 0 7px;
        font-size: 12px;
        border-radius: 4px;
        border: 1px solid transparent;
        text-transform: uppercase;
      }
      .ant-tag-green { color:#389e0d; background:#f6ffed; border-color:#b7eb8f; }
      .ant-tag-geekblue { color:#1d39c4; background:#f0f5ff; border-color:#adc6ff; }
      .ant-tag-volcano { color:#d4380d; background:#fff2e8; border-color:#ffbb96; }

      .cell-actions {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        white-space: nowrap;
      }
      .ant-link { color: var(--link); text-decoration: none; cursor: pointer; }
      .ant-link:hover { color: #7C3AED; }
      .ant-divider-vertical { width: 1px; height: 14px; background: var(--line); }

      @media (max-width: 980px) {
        .query-grid { grid-template-columns: repeat(2, minmax(140px, 1fr)); }
      }
      @media (max-width: 640px) {
        .query-grid { grid-template-columns: 1fr; }
        .actions { flex-wrap: wrap; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="header">
        <h1>{{PAGE_TITLE}}</h1>
        <div class="meta">{{BRAND}} · Ant-style HTML</div>
      </div>

      <section class="card query-card" aria-label="Query section">
        <div class="query-grid">{{QUERY_FIELDS}}</div>
        <div class="actions" aria-label="Action section">
          <button class="ant-btn primary" type="button">查询</button>
          <button class="ant-btn" type="button">重置</button>
          <button class="ant-btn" type="button">导出</button>
        </div>
      </section>

      <section class="card list-card" aria-label="List section">
        {{LIST_HEADER}}
        <div class="table-wrap">
          <table class="ant-table {{VERTICAL_CLASS}}" role="table" aria-label="Ant style list table">
            <thead><tr>{{TABLE_HEAD_CELLS}}</tr></thead>
            <tbody>{{TABLE_BODY_ROWS}}</tbody>
          </table>
        </div>
      </section>
    </div>
  </body>
</html>
